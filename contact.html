{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="section">
  <div class="container">

    <!-- Page Title -->
    <h2 class="page-title">HAVE SOME QUESTIONS?</h2>

    <!-- Wrapper that holds the map/location on one side and the form on the other -->
    <div class="contact-wrapper">

      <!-- Left side: Map -->
      <div class="map-container">
        <iframe 
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2469626.0805100426!2d-4.965894222027749!3d52.80894908084857!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47d0a98a6c1ed5df%3A0xf4e19525332d8ea8!2sEngland!5e0!3m2!1sen!2suk!4v1743157861006!5m2!1sen!2suk" 
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>

        <!-- Location Info -->
        <div class="location-info">
          <span>123 Green Energy Way, Greenshire, GR3 3NN, Energy Kingdom</span>
        </div>
      </div>
      <!-- End .map-container -->

      <!-- Right side: Contact Form -->
      <div class="contact-form-container">
        <form method="POST" action="{% url 'contact' %}">
          {% csrf_token %}
          <input type="text" name="first_name" placeholder="First Name" required>
          <input type="text" name="last_name" placeholder="Last Name" required>
          <input type="email" name="email" placeholder="What's your email?" required>
          <textarea name="message" placeholder="Your questions..." required></textarea>
          <button type="submit" class="btn">SEND MESSAGE</button>
        </form>
      </div>
      <!-- End .contact-form-container -->

    </div> <!-- End .contact-wrapper -->

  </div> <!-- End .container -->
</section>
{% endblock %}
